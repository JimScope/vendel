# Mirrors the Go SDK to github.com/JimScope/vendel-sdk-go and creates a version tag.
# Go modules are published via git tags — the Go proxy indexes them automatically.
#
# Setup:
#   1. Create the repo: github.com/JimScope/vendel-sdk-go (can be empty)
#   2. Create a fine-grained PAT with "Contents: Read and write" on vendel-sdk-go
#   3. Add it as a repository secret: Settings → Secrets → SDK_GO_PAT
#
# Usage:
#   git tag sdk-go/v0.2.0 && git push origin sdk-go/v0.2.0

name: Publish SDK - Go

on:
  push:
    tags:
      - "sdk-go/v*"

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/sdk-go/}" >> "$GITHUB_OUTPUT"

      - name: Mirror to vendel-sdk-go
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PAT: ${{ secrets.SDK_GO_PAT }}
        run: |
          REPO_URL="https://x-access-token:${PAT}@github.com/JimScope/vendel-sdk-go.git"

          # Clone target repo (or init if empty)
          git clone "$REPO_URL" /tmp/sdk-go 2>/dev/null || {
            mkdir -p /tmp/sdk-go
            cd /tmp/sdk-go
            git init
            git remote add origin "$REPO_URL"
          }

          cd /tmp/sdk-go

          # Remove all tracked files
          git rm -rf . 2>/dev/null || true

          # Copy SDK source
          cp -r "${GITHUB_WORKSPACE}/sdks/go/." .

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git push origin HEAD:main
          git push origin "${VERSION}"
