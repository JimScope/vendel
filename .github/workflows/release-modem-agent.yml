name: Release Modem Agent

on:
  push:
    tags:
      - "modem-agent/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: modem-agent/go.mod

      - name: Strip tag prefix
        run: echo "GORELEASER_CURRENT_TAG=${GITHUB_REF_NAME#modem-agent/}" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
          workdir: modem-agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
