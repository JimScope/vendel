# Publishes the JavaScript/TypeScript SDK to npm.
#
# Setup:
#   1. Create an npm access token at https://www.npmjs.com/settings/~/tokens
#   2. Add it as a repository secret: Settings → Secrets → NPM_TOKEN
#
# Usage:
#   1. Update "version" in sdks/javascript/package.json
#   2. Commit and push
#   3. git tag sdk-js/v0.2.0 && git push origin sdk-js/v0.2.0

name: Publish SDK - JavaScript

on:
  push:
    tags:
      - "sdk-js/v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: sdks/javascript
        run: npm install

      - name: Publish to npm
        working-directory: sdks/javascript
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
