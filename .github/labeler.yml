documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'frontend/package.json'
      - 'frontend/bun.lock'
      - 'frontend/package-lock.json'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'modem-agent/go.mod'
      - 'modem-agent/go.sum'
      - 'smpp-agent/go.mod'
      - 'smpp-agent/go.sum'
      - 'agent-core/go.mod'
      - 'agent-core/go.sum'

go:
  - changed-files:
    - any-glob-to-any-file:
      - 'backend/**/*.go'
      - 'modem-agent/**/*.go'
      - 'smpp-agent/**/*.go'
      - 'agent-core/**/*.go'
