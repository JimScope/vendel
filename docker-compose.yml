services:
  app:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/app/pb_data
    environment:
      - ENVIRONMENT=production
      - FIRST_SUPERUSER=${FIRST_SUPERUSER:-admin@ender.app}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD:-changethis}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-qvapay}
      - QVAPAY_APP_ID=${QVAPAY_APP_ID:-}
      - QVAPAY_APP_SECRET=${QVAPAY_APP_SECRET:-}
      - TROPIPAY_CLIENT_ID=${TROPIPAY_CLIENT_ID:-}
      - TROPIPAY_CLIENT_SECRET=${TROPIPAY_CLIENT_SECRET:-}
      - TROPIPAY_ENVIRONMENT=${TROPIPAY_ENVIRONMENT:-sandbox}
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:8090}
      - FRONTEND_HOST=${FRONTEND_HOST:-http://localhost:5173}
    restart: unless-stopped

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"  # Web UI
      - "1025:1025"  # SMTP
    profiles:
      - dev

volumes:
  pb_data:
