services:
  app:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/app/pb_data
    environment:
      - ENVIRONMENT=production
      - FIRST_SUPERUSER=${FIRST_SUPERUSER:?FIRST_SUPERUSER is required}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD:?FIRST_SUPERUSER_PASSWORD is required}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - QVAPAY_APP_ID=${QVAPAY_APP_ID:-}
      - QVAPAY_APP_SECRET=${QVAPAY_APP_SECRET:-}
      - APP_URL=${APP_URL:-http://localhost:8090}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - LITESTREAM_REPLICA_URL=${LITESTREAM_REPLICA_URL:-}
      - LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID:-}
      - LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  modem-agent:
    build: ./modem-agent
    environment:
      - ENDER_URL=http://app:8090
      - MODEMS=${MODEMS:?MODEMS is required}
    devices:
      - "${MODEM_DEVICE_0:-/dev/ttyUSB0}:/dev/ttyUSB0"
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - modem
    restart: unless-stopped

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"  # Web UI
      - "1025:1025"  # SMTP
    profiles:
      - dev

volumes:
  pb_data:
